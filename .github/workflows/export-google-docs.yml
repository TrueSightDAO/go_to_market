# Nightly export of partnership-agreement Google Docs to Markdown in
# TrueSightDAO/ecosystem_change_logs/agreements/. Makes the agreements LLM-fetchable via
# raw.githubusercontent.com (Google Docs themselves are not readable by external LLMs —
# WebFetch returns the Drive nav shell, not the doc body).
#
# Required repository secrets (go_to_market / market_research clone):
#   WHITEPAPER_GOOGLE_SA_JSON  — service-account JSON for
#     truesightme-whitepapers@get-data-io.iam.gserviceaccount.com.
#     Each source Google Doc must be shared with that email as Viewer.
#   ORACLE_ADVISORY_PUSH_TOKEN — fine-grained PAT with Contents: Read+Write on
#     TrueSightDAO/ecosystem_change_logs (re-used from advisory-snapshot-refresh.yml).

name: Export partnership agreements from Google Docs

on:
  workflow_dispatch:
  schedule:
    # 03:14 UTC daily — offset from other workflows to avoid Sheets/Drive burst collisions.
    - cron: "14 3 * * *"

concurrency:
  group: export-google-docs
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout market_research
        uses: actions/checkout@v4
        with:
          path: repos/market_research

      - name: Checkout ecosystem_change_logs (target)
        uses: actions/checkout@v4
        with:
          repository: TrueSightDAO/ecosystem_change_logs
          path: repos/ecosystem_change_logs
          fetch-depth: 100
          token: ${{ secrets.ORACLE_ADVISORY_PUSH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "google-auth>=2.23" "google-api-python-client>=2.100"

      - name: Write service-account credentials
        run: |
          mkdir -p repos/market_research/credentials
          echo '${{ secrets.WHITEPAPER_GOOGLE_SA_JSON }}' > repos/market_research/credentials/white_paper_google_sa.json

      - name: Export Google Docs to Markdown
        working-directory: repos/market_research
        run: |
          python3 scripts/export_google_docs.py \
            --output-dir ../ecosystem_change_logs/agreements

      - name: Commit and push if changed
        working-directory: repos/ecosystem_change_logs
        env:
          TARGET_TOKEN: ${{ secrets.ORACLE_ADVISORY_PUSH_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${TARGET_TOKEN}@github.com/TrueSightDAO/ecosystem_change_logs.git"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add agreements/
          if git diff --staged --quiet; then
            echo "No agreement changes today; skipping commit."
          else
            git commit -m "chore(agreements): refresh Google Doc Markdown mirror [skip ci]"
            git push origin HEAD:main
          fi
