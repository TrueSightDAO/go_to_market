# Automated Hit List "Research" photo review (Google Places + Grok vision).
# Processes up to N shops per run to stay within reasonable time and API quotas.
#
# Required repository secrets (Settings → Secrets → Actions):
#   GOOGLE_CREDENTIALS_JSON — same service account JSON as other market_research workflows (Sheets editor on Hit List)
#   GOOGLE_MAPS_API_KEY — Places + Place Photos (must allow GitHub Actions egress IPs or be unrestricted for server use)
#   GROK_API_KEY — xAI key with vision-capable model access (e.g. grok-4-1-fast-non-reasoning)
#
# Sheets / API quota: scheduled runs default to 20 shops/hour; use workflow_dispatch to override.
#
# Hourly schedule processes rows with Status = Research only (see script). Overlap: one run
# at a time per concurrency group so two hours do not double-write.

name: Hit List Research photo review

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Max Hit List rows to process (Research only unless shop is set)
        required: true
        default: "20"
      shop:
        description: Optional shop name substring (bypasses Research-only filter)
        required: false
        default: ""
  schedule:
    # Every hour at :00 UTC — pick up new Research rows (up to default limit per run)
    - cron: "0 * * * *"

concurrency:
  group: hit-list-research-photo-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write service account JSON
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: printf '%s' "$GOOGLE_CREDENTIALS_JSON" > google_credentials.json

      - name: Run photo review script
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          # Required for places_cache.py to read+write the persistent
          # Place Details cache in TrueSightDAO/places-cache. Without it
          # every cron run hits the live Places API and pays full price.
          PLACES_CACHE_PAT: ${{ secrets.PLACES_CACHE_PAT }}
          INPUT_LIMIT: ${{ github.event.inputs.limit || '' }}
          INPUT_SHOP: ${{ github.event.inputs.shop || '' }}
          SCHEDULE_DEFAULT_LIMIT: "20"
        run: |
          set -e
          LIMIT="${INPUT_LIMIT}"
          if [ -z "$LIMIT" ]; then LIMIT="$SCHEDULE_DEFAULT_LIMIT"; fi
          if [ -n "${INPUT_SHOP}" ]; then
            python3 scripts/hit_list_research_photo_review.py --limit "$LIMIT" --shop "${INPUT_SHOP}"
          else
            python3 scripts/hit_list_research_photo_review.py --limit "$LIMIT"
          fi
