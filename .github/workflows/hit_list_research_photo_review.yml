# Hit List "Research" photo review (Google Places + Grok vision).
#
# RETIRED FROM CRON 2026-05-03 — this pipeline is no longer the qualifier.
# detect_circle_hosting_retailers.py (cron at :50 hourly) now handles
# Research-row qualification cheaply via free site keyword crawl:
#   - hits → AI: Warm-up needed (if email known) or AI: Enrich with contact
#   - no hits + crawled OK → AI: Photo rejected (status name preserved for
#     back-compat; meaning is "site shows no qualifying signals")
#
# Photos no longer drive qualification. The site crawl already tells us
# whether a row is a fit, and photos add minimal context to the warm-up
# draft (see in-thread Buck's Spices reply for evidence).
#
# This workflow stays defined as workflow_dispatch only so the photo review
# can be triggered manually if ever needed (e.g. spot-debugging Grok rubric
# regressions on a specific shop). The cron schedule that was here
# (`0 * * * *` — Hourly) was the single largest Places API line item until
# 2026-05-03 because it called Find Place + Place Details + up to 5 Place
# Photos per shop at $7/1k each.

name: Hit List Research photo review (manual only — retired from cron)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Max Hit List rows to process (Research only unless shop is set)
        required: true
        default: "20"
      shop:
        description: Optional shop name substring (bypasses Research-only filter)
        required: false
        default: ""

concurrency:
  group: hit-list-research-photo-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write service account JSON
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: printf '%s' "$GOOGLE_CREDENTIALS_JSON" > google_credentials.json

      - name: Run photo review script
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          # Required for places_cache.py to read+write the persistent
          # Place Details cache in TrueSightDAO/places-cache. Without it
          # every cron run hits the live Places API and pays full price.
          PLACES_CACHE_PAT: ${{ secrets.PLACES_CACHE_PAT }}
          INPUT_LIMIT: ${{ github.event.inputs.limit || '' }}
          INPUT_SHOP: ${{ github.event.inputs.shop || '' }}
          SCHEDULE_DEFAULT_LIMIT: "20"
        run: |
          set -e
          LIMIT="${INPUT_LIMIT}"
          if [ -z "$LIMIT" ]; then LIMIT="$SCHEDULE_DEFAULT_LIMIT"; fi
          if [ -n "${INPUT_SHOP}" ]; then
            python3 scripts/hit_list_research_photo_review.py --limit "$LIMIT" --shop "${INPUT_SHOP}"
          else
            python3 scripts/hit_list_research_photo_review.py --limit "$LIMIT"
          fi
