# Gmail sent → "Email Agent Follow Up" tab + warm-up reply promotion.
# Schedule: every hour (`cron: '0 * * * *'`).
#   1. sync_email_agent_followup.py — refreshes Email Agent Follow Up from Gmail sent mail
#   2. suggest_warmup_prospect_drafts.py --reply-promotion-only — promotes AI: Warm up prospect →
#      AI: Prospect replied when Gmail shows inbound from the prospect after the last logged send
# Code path: `scripts/sync_email_agent_followup.py` on the **default branch** — merge PRs that
# change that script before expecting new columns (e.g. body_plain).
# Optional one-time: run locally or add workflow_dispatch input `backfill_body_plain` to fill empty body_plain.
# Pair with manager-followup-drafts.yml for draft generation (daily).
#
# Secrets: GOOGLE_CREDENTIALS_JSON, GMAIL_TOKEN_JSON
name: Email Agent Follow Up sync

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — no Sheet writes'
        type: boolean
        default: false
      backfill_body_plain:
        description: 'After sync, backfill empty body_plain via Gmail (uses quota; one-time catch-up)'
        type: boolean
        default: false
  schedule:
    - cron: '0 * * * *'

jobs:
  sync-follow-up:
    name: Sync Email Agent Follow Up
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google credentials file
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          echo "$GOOGLE_CREDENTIALS_JSON" > google_credentials.json

      - name: Sync Email Agent Follow Up (Gmail sent → sheet)
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_BACKFILL: ${{ github.event.inputs.backfill_body_plain }}
        run: |
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            python scripts/sync_email_agent_followup.py --dry-run
            exit 0
          fi
          python scripts/sync_email_agent_followup.py
          if [ "${INPUT_BACKFILL:-false}" = "true" ]; then
            python scripts/sync_email_agent_followup.py --backfill-body-plain --backfill-only
          fi

      - name: Promote warm-up replies (AI: Warm up prospect → AI: Prospect replied)
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            python scripts/suggest_warmup_prospect_drafts.py --reply-promotion-only --dry-run
          else
            python scripts/suggest_warmup_prospect_drafts.py --reply-promotion-only
          fi
