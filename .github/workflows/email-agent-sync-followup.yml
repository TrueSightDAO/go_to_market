# Lightweight job: Gmail sent → "Email Agent Follow Up" only (no training, no drafts).
# Keeps last-sent timestamps fresh for humans and for the daily cadence-gated draft workflow.
# Pair with manager-followup-drafts.yml (daily). If you need fewer Gmail API calls, change cron to e.g. '0 */6 * * *'.
#
# Secrets: GOOGLE_CREDENTIALS_JSON, GMAIL_TOKEN_JSON
name: Email Agent Follow Up sync

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — no Sheet writes'
        type: boolean
        default: false
  schedule:
    - cron: '0 * * * *'

jobs:
  sync-follow-up:
    name: Sync Email Agent Follow Up
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google credentials file
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          echo "$GOOGLE_CREDENTIALS_JSON" > google_credentials.json

      - name: Sync Email Agent Follow Up (Gmail sent → sheet)
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            python scripts/sync_email_agent_followup.py --dry-run
          else
            python scripts/sync_email_agent_followup.py
          fi
